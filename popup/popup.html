<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <title>DistractionFree</title>
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <div class="header">
      <div class="mascot">
        <svg width="56" height="56" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="96" fill="#FDF6EC"/>
          <ellipse cx="100" cy="115" rx="72" ry="68" fill="#E8943C"/>
          <ellipse cx="80" cy="95" rx="30" ry="22" fill="#F0B870" opacity="0.5"/>
          <rect x="95" y="42" width="10" height="18" rx="5" fill="#5B8C3E"/>
          <ellipse cx="82" cy="52" rx="18" ry="8" fill="#6EAE3E" transform="rotate(-25 82 52)"/>
          <ellipse cx="118" cy="52" rx="18" ry="8" fill="#6EAE3E" transform="rotate(25 118 52)"/>
          <ellipse cx="80" cy="112" rx="8" ry="9" fill="#3D2417"/>
          <ellipse cx="120" cy="112" rx="8" ry="9" fill="#3D2417"/>
          <circle cx="83" cy="108" r="3.5" fill="white"/>
          <circle cx="123" cy="108" r="3.5" fill="white"/>
          <path d="M88 126 Q100 138 112 126" stroke="#3D2417" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <ellipse cx="66" cy="124" rx="10" ry="7" fill="#F5A0A0" opacity="0.6"/>
          <ellipse cx="134" cy="124" rx="10" ry="7" fill="#F5A0A0" opacity="0.6"/>
        </svg>
      </div>
      <h1 class="title">DistractionFree</h1>
      <p class="subtitle">Stay focused, stay awesome!</p>
    </div>

    <!-- Site label -->
    <div class="site-label">💼 LinkedIn</div>

    <!-- Toggles -->
    <div class="card">
      <div class="toggle-row" data-site="linkedin" data-key="feedEnabled">
        <span class="site-name">Hide Feed</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="divider"></div>
      <div class="toggle-row" data-site="linkedin" data-key="hideNewsSidebar">
        <span class="site-name">Hide Top Stories</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="divider"></div>
      <div class="toggle-row" data-site="linkedin" data-key="hideStartPost">
        <span class="site-name">Hide Start a Post</span>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="divider"></div>
      <div class="toggle-row" data-site="linkedin" data-key="hideMyPages">
        <span class="site-name">Hide My Pages</span>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="divider"></div>
      <div class="toggle-row" data-site="linkedin" data-key="hideFollowPages">
        <span class="site-name">Hide Follow Suggestions</span>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="divider"></div>
      <div class="toggle-row" data-site="linkedin" data-key="hideStatsDashboard">
        <span class="site-name">Hide Stats Dashboard</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Site label -->
    <div class="site-label" style="margin-top:12px;">▶️ YouTube</div>

    <!-- Toggles -->
    <div class="card">
      <div class="toggle-row" data-site="youtube" data-key="feedEnabled">
        <span class="site-name">Hide Feed</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="footer">
      Made with 🧡 to help you focus
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
